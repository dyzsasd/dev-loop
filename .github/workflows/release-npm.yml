name: Release npm package

# Publish from the GitHub UI: Actions → "Release npm package" → Run workflow → pick a bump type.
# The workflow computes the next version from hub/package.json, requires a matching CHANGELOG
# section (renaming "## Unreleased" into the version if present), stamps the four manifests,
# tests, tags, and publishes. Bump conventions + auth setup live in docs/RELEASING.md.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "patch = fixes/docs · minor = new features/config · major = breaking · explicit = use `version` (e.g. resume a half-finished release)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - explicit
      version:
        description: "Bare semver, only with bump: explicit (e.g. 1.2.1)"
        required: false
        type: string
      npm_tag:
        description: "npm dist-tag"
        required: true
        default: latest
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  release:
    name: Tag and publish
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: "@dyzsasd/dev-loop"
      BUMP: ${{ inputs.bump }}
      INPUT_VERSION: ${{ inputs.version }}
      NPM_TAG: ${{ inputs.npm_tag }}
      # Explicit npm scripts still run; their implicit pre*/post* hooks do not.
      NPM_CONFIG_IGNORE_SCRIPTS: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags for the integrity gate
        run: git fetch --force --tags origin

      - name: Verify source integrity (pre-install)
        run: |
          python3 -m unittest security.test_source_integrity
          python3 security/source_integrity.py
          python3 security/source_integrity.py --all-history

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version
        shell: bash
        run: |
          set -euo pipefail

          CURRENT="$(node -p "require('./hub/package.json').version")"
          if [[ ! "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "hub/package.json version '$CURRENT' is not bare semver — reconcile manually."
            exit 1
          fi
          IFS=. read -r MA MI PA <<< "$CURRENT"

          case "$BUMP" in
            patch)    VERSION="$MA.$MI.$((PA + 1))" ;;
            minor)    VERSION="$MA.$((MI + 1)).0" ;;
            major)    VERSION="$((MA + 1)).0.0" ;;
            explicit)
              if [[ ! "${INPUT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
                echo "bump: explicit needs a bare-semver \`version\` input, for example 1.2.1. Got: '${INPUT_VERSION}'"
                exit 1
              fi
              VERSION="${INPUT_VERSION}"
              ;;
          esac

          echo "Releasing: $CURRENT → $VERSION (bump: $BUMP)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Validate release target
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Run this workflow from a branch, not ${GITHUB_REF_TYPE}."
            exit 1
          fi

          git fetch --force --tags origin
          python3 security/source_integrity.py --all-history
          NPM_EXISTS=0
          if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
            NPM_EXISTS=1
          fi
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            if [ "$NPM_EXISTS" = "1" ]; then
              echo "v$VERSION is already fully released (tag + npm)."
              exit 1
            fi
            # Tag was pushed but a later step failed: re-running (bump: explicit) resumes the publish.
            echo "Tag v$VERSION exists but $PACKAGE_NAME@$VERSION is not on npm — resuming publish."
          elif [ "$NPM_EXISTS" = "1" ]; then
            echo "$PACKAGE_NAME@$VERSION is on npm but tag v$VERSION is missing — reconcile manually."
            exit 1
          fi

      # The changelog IS the release gate: every release ships a "## <version>" section. Accumulate
      # entries under "## Unreleased" between releases — this step stamps it into the version being
      # cut (the rename rides the release commit). A release with NO changelog section is refused.
      - name: Stamp the changelog section
        shell: bash
        run: |
          set -euo pipefail

          if grep -qxF "## $VERSION" CHANGELOG.md; then
            echo "CHANGELOG.md already carries '## $VERSION'."
          elif grep -qxF "## Unreleased" CHANGELOG.md; then
            sed -i "s/^## Unreleased$/## $VERSION/" CHANGELOG.md
            echo "Renamed '## Unreleased' → '## $VERSION'."
          else
            echo "CHANGELOG.md has neither '## $VERSION' nor '## Unreleased' — add the release notes first (docs/RELEASING.md)."
            exit 1
          fi

      - name: Install dependencies
        working-directory: hub
        run: npm ci --ignore-scripts

      - name: Stamp version files
        working-directory: hub
        run: |
          node src/release-version.ts "$VERSION"
          npm install --package-lock-only --ignore-scripts

      - name: Typecheck
        working-directory: hub
        run: npm run typecheck

      - name: Test package
        working-directory: hub
        run: npm test

      - name: Build package
        working-directory: hub
        run: npm run build

      - name: Verify source integrity (post-build)
        run: python3 security/source_integrity.py --whole-tree

      - name: Commit and tag release
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add CHANGELOG.md .claude-plugin/plugin.json .claude-plugin/marketplace.json hub/package.json hub/package-lock.json
          if git diff --cached --quiet; then
            echo "Version files already match $VERSION; no release commit needed."
          else
            git commit -m "chore(release): v$VERSION"
          fi

          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            TAG_COMMIT="$(git rev-parse "refs/tags/v$VERSION^{commit}")"
            HEAD_COMMIT="$(git rev-parse HEAD)"
            if [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
              echo "Existing tag v$VERSION points to $TAG_COMMIT, not release commit $HEAD_COMMIT."
              exit 1
            fi
            echo "Tag v$VERSION already exists; reusing it."
          else
            git tag -a "v$VERSION" -m "Release v$VERSION"
          fi

      - name: Verify final release refs and source integrity
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse "refs/tags/v$VERSION^{commit}")" = "$(git rev-parse HEAD)"
          python3 security/source_integrity.py --whole-tree
          python3 security/source_integrity.py --all-history

      # Push BEFORE publish: npm versions are irrevocable, git pushes are recoverable.
      # A failed publish leaves a pushed tag; re-running with bump: explicit resumes from it.
      - name: Push release commit and tag
        shell: bash
        run: |
          set -euo pipefail
          git push --atomic origin "HEAD:${GITHUB_REF_NAME}" "v$VERSION"

      - name: Verify remote release refs before publish
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED="$(git rev-parse HEAD)"
          REMOTE_BRANCH="$(git ls-remote --heads origin "refs/heads/${GITHUB_REF_NAME}" | awk 'NR == 1 { print $1 }')"
          REMOTE_TAG="$(git ls-remote --tags origin "refs/tags/v$VERSION^{}" | awk 'NR == 1 { print $1 }')"
          if [ "$REMOTE_BRANCH" != "$EXPECTED" ] || [ "$REMOTE_TAG" != "$EXPECTED" ]; then
            echo "Remote branch/tag no longer match release commit $EXPECTED."
            exit 1
          fi

      # Auth, either of (docs/RELEASING.md):
      #   1. NPM_TOKEN repo secret (npm automation/granular token with publish access), or
      #   2. npm trusted publishing (OIDC) — configure this repo + workflow file as a Trusted
      #      Publisher for the package on npmjs.com; no secret needed (npm >= 11.5.1 exchanges
      #      the Actions id-token automatically when no token is present).
      - name: Publish to npm
        working-directory: hub
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "No NPM_TOKEN secret — relying on npm trusted publishing (OIDC)."
            npm install -g --ignore-scripts "npm@11.5.1" >/dev/null
          fi
          npm publish --ignore-scripts --access public --tag "$NPM_TAG" --provenance
