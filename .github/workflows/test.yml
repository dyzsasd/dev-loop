name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      # Explicit npm scripts still run; their implicit pre*/post* hooks do not.
      NPM_CONFIG_IGNORE_SCRIPTS: "true"
    strategy:
      fail-fast: false
      matrix:
        # 23.6 is the documented engines floor (hub/package.json); 24 is what releases use.
        node: ["23.6.0", "24"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify source integrity (pre-install)
        run: |
          python3 -m unittest security.test_source_integrity security.test_local_code_scan
          python3 security/source_integrity.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        working-directory: hub
        run: npm ci --ignore-scripts

      - name: Typecheck
        working-directory: hub
        run: npm run typecheck

      - name: Test
        working-directory: hub
        run: npm test

      - name: Verify source integrity (post-test)
        if: always()
        run: python3 security/source_integrity.py --whole-tree
