name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      # Explicit npm scripts still run; their implicit pre*/post* hooks do not.
      NPM_CONFIG_IGNORE_SCRIPTS: "true"
    strategy:
      fail-fast: false
      matrix:
        # 23.6 is the documented engines floor (hub/package.json); 24 is what releases use.
        node: ["23.6.0", "24"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify source integrity (pre-install)
        run: |
          python3 -m unittest security.test_source_integrity security.test_local_code_scan
          python3 security/source_integrity.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        working-directory: hub
        run: npm ci --ignore-scripts

      - name: Typecheck
        working-directory: hub
        run: npm run typecheck

      - name: Test
        working-directory: hub
        run: npm test
        env:
          NODE_V8_COVERAGE: ${{ github.workspace }}/hub/.v8cov

      # The quality ratchet (quality-gauntlet design): reuse the coverage the test step just
      # collected (zero extra test time) and gate the per-function CRAP maximum. 1.7.0 started at
      # 380 (just above cli-agentops.main's 374); the 1.8 refactors dropped the ceiling to 156
      # (daemon.ts:719 anon, 0% covered) — threshold 160 freezes THAT. Tighten as the queue drains.
      - name: Quality gate (CRAP ratchet)
        working-directory: hub
        run: node src/quality.ts --coverage-dir .v8cov --threshold 160 --top 15

      - name: Verify source integrity (post-test)
        if: always()
        run: python3 security/source_integrity.py --whole-tree
