apiVersion: v1
kind: Service
metadata:
  name: {{ include "dev-loop.fullname" . }}
  labels: {{- include "dev-loop.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "dev-loop.selectorLabels" . | nindent 4 }}
  ports:
    - { name: board, port: {{ .Values.daemonPort }}, targetPort: board }
